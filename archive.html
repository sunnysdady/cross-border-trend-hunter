<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史捕获 · 爆款捕手</title>
<meta name="description" content="爆款捕手历史捕获：每日异常爆款趋势的完整归档，可搜索、可按品类筛选。">
<link rel="canonical" href="/archive.html">
<meta property="og:type" content="website">
<meta property="og:title" content="历史捕获 · 爆款捕手">
<meta property="og:description" content="每日异常爆款趋势的完整归档，可搜索、可按品类筛选。">
<meta name="theme-color" content="#2dd4bf">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232dd4bf'/%3E%3Ctext x='50' y='72' font-size='62' text-anchor='middle'%3E🎯%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:oklch(0.17 0.008 260);--surface:oklch(0.215 0.01 260);--surface-2:oklch(0.255 0.012 260);
  --ink:oklch(0.96 0.004 260);--ink-2:oklch(0.82 0.008 260);--muted:oklch(0.68 0.01 260);
  --line:oklch(1 0 0 / 0.10);--line-2:oklch(1 0 0 / 0.06);--accent:#2dd4bf;--on-accent:#06231d;
  --maxw:72rem;
  --display:"Bricolage Grotesque","PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
  --body:system-ui,-apple-system,"PingFang SC","Hiragino Sans GB","Noto Sans SC","Microsoft YaHei",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:var(--on-accent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
.skip{position:absolute;left:-999px;top:0;background:var(--accent);color:var(--on-accent);padding:.6rem 1rem;border-radius:0 0 .5rem 0;z-index:50}
.skip:focus{left:0}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(1.1rem,4vw,2rem)}
.topbar{position:sticky;top:0;z-index:20;background:oklch(0.17 0.008 260 / 0.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-2)}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:56px;gap:1rem}
.brand{display:flex;align-items:center;gap:.55rem;font-family:var(--display);font-weight:700;letter-spacing:-0.01em}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px color-mix(in oklch,var(--accent) 22%,transparent)}
.brand small{color:var(--muted);font-weight:500;font-family:var(--mono);font-size:.74rem}
.topbar a.back{font-size:.82rem;color:var(--ink-2);text-decoration:none;padding:.4rem .7rem;border:1px solid var(--line);border-radius:.5rem;transition:border-color .2s,color .2s}
.topbar a.back:hover{color:var(--ink);border-color:var(--accent)}
.head{padding:clamp(2.4rem,6vw,4rem) 0 1.4rem}
.head h1{font-family:var(--display);font-weight:800;font-size:clamp(2rem,5.5vw,3.4rem);letter-spacing:-0.03em;text-wrap:balance}
.head p{color:var(--ink-2);margin-top:.6rem;font-size:1.02rem;max-width:52ch}
.controls{display:flex;flex-wrap:wrap;gap:.8rem;align-items:center;margin:1.8rem 0 0}
.search{position:relative;flex:1 1 18rem}
.search input{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:.7rem;color:var(--ink);font:inherit;padding:.7rem .9rem .7rem 2.4rem;outline:none;transition:border-color .2s}
.search input::placeholder{color:var(--muted)}
.search input:focus{border-color:var(--accent)}
.search .ic{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.filters{display:flex;flex-wrap:wrap;gap:.4rem}
.chip{appearance:none;font:inherit;cursor:pointer;background:transparent;color:var(--ink-2);border:1px solid var(--line);border-radius:2rem;padding:.4rem .9rem;font-size:.82rem;transition:color .2s,border-color .2s,background .2s}
.chip:hover{color:var(--ink);border-color:var(--accent)}
.chip[aria-pressed="true"]{background:var(--accent);color:var(--on-accent);border-color:var(--accent);font-weight:600}
.stats{color:var(--muted);font-size:.84rem;font-family:var(--mono);margin:1.4rem 0 .4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(20rem,1fr));gap:1rem;padding:1rem 0 3rem}
.card{display:block;background:var(--surface);border:1px solid var(--line);border-radius:1rem;padding:1.4rem;text-decoration:none;color:inherit;transition:transform .2s cubic-bezier(.16,1,.3,1),border-color .2s;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--bar,var(--accent))}
.card:hover{transform:translateY(-3px);border-color:var(--accent)}
.card .d{font-family:var(--mono);font-size:.74rem;color:var(--muted);margin-bottom:.5rem}
.card .t{font-family:var(--display);font-weight:700;font-size:1.12rem;line-height:1.3;letter-spacing:-0.01em;text-wrap:balance}
.card .m{display:flex;gap:1rem;margin-top:.9rem;font-size:.8rem;color:var(--ink-2);font-family:var(--mono)}
.empty{text-align:center;padding:4rem 1.5rem;color:var(--muted)}
.empty .e{font-size:3rem;margin-bottom:1rem}
.foot{border-top:1px solid var(--line-2);padding:2rem 0 3rem;text-align:center;color:var(--muted);font-size:.8rem}
.foot a{color:var(--accent);text-decoration:none}
@media (prefers-reduced-motion:reduce){.card:hover{transform:none}}
</style>
</head>
<body>
<a class="skip" href="#grid">跳到列表</a>
<div class="topbar"><div class="wrap">
  <span class="brand"><span class="dot"></span>爆款捕手 <small>Boom Catcher</small></span>
  <a class="back" href="index.html">← 回到今天</a>
</div></div>

<header class="head"><div class="wrap">
  <h1>历史捕获</h1>
  <p>每天捕捉一次异常爆款信号，这里是完整归档。搜索产品、主题或品类，或按品类筛选。</p>
  <div class="controls">
    <div class="search">
      <span class="ic" aria-hidden="true">🔍</span>
      <input type="search" id="q" placeholder="搜索产品名、品类、主题…" aria-label="搜索历史捕获">
    </div>
    <div class="filters" id="filters" role="group" aria-label="按品类筛选"></div>
  </div>
  <p class="stats" id="stats" aria-live="polite"></p>
</div></header>

<main id="grid" class="wrap"><div class="grid" id="cards">
  <div class="empty"><div class="e">📭</div><p>正在加载历史数据…</p></div>
</div></main>

<footer class="foot"><div class="wrap">
  <p>🤖 由 GitHub Actions + Claude 每日自动生成 · <a href="index.html">回到今天的捕获 →</a></p>
</div></footer>

<script>
let all=[],active='all';
const $=s=>document.querySelector(s);
function fmt(d){const p=d.split('-');return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';}
async function load(){
  try{
    const r=await fetch('data/archive-index.json'); if(!r.ok)throw 0;
    const d=await r.json(); all=d.days||[];
    buildFilters(); apply();
  }catch(e){
    $('#cards').innerHTML='<div class="empty"><div class="e">📭</div><p>还没有历史数据，第一次生成后这里就会填满。</p></div>';
  }
}
function buildFilters(){
  const cats=[...new Set(all.map(d=>d.top_category).filter(Boolean))].sort();
  const f=$('#filters');
  f.innerHTML='';
  mk('all','全部');
  cats.forEach(c=>mk(c,c));
  function mk(val,label){
    const b=document.createElement('button');
    b.className='chip';b.textContent=label;b.type='button';
    b.setAttribute('aria-pressed',String(val==='all'));
    b.onclick=()=>{active=val;[...f.children].forEach(x=>x.setAttribute('aria-pressed',String(x===b)));apply();};
    f.appendChild(b);
  }
}
function apply(){
  const q=$('#q').value.toLowerCase();
  let list=all;
  if(active!=='all')list=list.filter(d=>d.top_category===active);
  if(q)list=list.filter(d=>[d.theme,d.top_product,d.top_category].some(v=>(v||'').toLowerCase().includes(q)));
  render(list);
  $('#stats').textContent='共 '+all.length+' 天 · 显示 '+list.length+' 条'+(all.length?' · 最新 '+fmt(all[0].date):'');
}
function render(list){
  const g=$('#cards');
  if(!list.length){g.innerHTML='<div class="empty"><div class="e">🔍</div><p>没有匹配的历史记录</p></div>';return;}
  g.innerHTML=list.map(d=>`
    <a class="card" href="daily/${d.date}.html" style="--bar:${d.cover_color||'#2dd4bf'}">
      <div class="d">${fmt(d.date)}</div>
      <div class="t">${d.theme||''}</div>
      <div class="m"><span>🔥 ${d.outliers_count||0} 爆款</span><span>📦 ${d.top_product||''}</span></div>
    </a>`).join('');
}
$('#q').addEventListener('input',apply);
load();
</script>
</body>
</html>
