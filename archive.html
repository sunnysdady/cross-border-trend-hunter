<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史捕获 · 爆款捕手</title>
<link rel="stylesheet" href="css/style.css">
<style>
  :root {
    --bg-primary: #0f0f23;
    --bg-card: #1a1a2e;
    --bg-accent: #16213e;
    --text-primary: #eaeaea;
    --text-secondary: #a0a0b0;
    --text-muted: #6c6c80;
    --accent: #e94560;
    --accent-glow: rgba(233, 69, 96, 0.3);
    --gradient-hero: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
    --border: rgba(255,255,255,0.08);
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --radius: 12px;
  }

  .archive-header {
    text-align: center; padding: 4rem 1.5rem 2rem;
    background: var(--gradient-hero); border-bottom: 1px solid var(--border);
  }

  .archive-header h1 {
    font-family: Georgia, serif;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    background: linear-gradient(135deg, var(--text-primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .back-link {
    display: inline-block; margin-top: 1rem;
    color: var(--accent); text-decoration: none; font-size: 0.9rem;
  }

  .search-bar {
    max-width: 500px; margin: 2rem auto 0;
    position: relative;
  }

  .search-bar input {
    width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text-primary);
    font-size: 0.95rem; outline: none;
    transition: border-color var(--transition);
  }

  .search-bar input:focus { border-color: var(--accent); }

  .search-bar .search-icon {
    position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%);
    color: var(--text-muted);
  }

  .filters {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    justify-content: center; margin-top: 1rem;
  }

  .filter-chip {
    padding: 0.35rem 0.9rem; border-radius: 20px;
    border: 1px solid var(--border); font-size: 0.8rem;
    cursor: pointer; color: var(--text-secondary);
    background: transparent;
    transition: all var(--transition);
  }

  .filter-chip:hover, .filter-chip.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  .archive-grid {
    max-width: 1100px; margin: 0 auto; padding: 3rem 1.5rem;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .day-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem;
    cursor: pointer; text-decoration: none; color: inherit;
    transition: all var(--transition);
    position: relative; overflow: hidden;
  }

  .day-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 30px rgba(233, 69, 96, 0.15);
  }

  .day-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
  }

  .day-card-date {
    font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;
  }

  .day-card-theme {
    font-family: Georgia, serif;
    font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem;
  }

  .day-card-meta {
    display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-secondary);
  }

  .day-card-meta span { display: flex; align-items: center; gap: 0.25rem; }

  .empty-state {
    text-align: center; padding: 4rem 1.5rem; color: var(--text-muted);
  }

  .empty-state-emoji { font-size: 4rem; margin-bottom: 1rem; }

  .stats-bar {
    max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;
    display: flex; gap: 1rem; justify-content: center;
    font-size: 0.85rem; color: var(--text-muted);
  }

  @media (max-width: 480px) {
    .archive-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="archive-header">
  <h1>📦 历史捕获</h1>
  <p style="color:var(--text-secondary);margin-top:0.5rem;">每天捕捉一次，记录每一次爆款信号</p>
  <a href="index.html" class="back-link">← 回到今天的捕获</a>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索产品名、品类、主题..." oninput="applyFilters()">
  </div>

  <div class="filters" id="filters">
    <button class="filter-chip active" data-category="all" onclick="setCategory('all', this)">全部</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="archive-grid" id="archiveGrid">
  <div class="empty-state">
    <div class="empty-state-emoji">📭</div>
    <p>正在加载历史数据...</p>
  </div>
</div>

<script>
let allDays = [];
let activeCategory = 'all';

async function loadArchive() {
  try {
    const resp = await fetch('data/archive-index.json');
    if (!resp.ok) throw new Error('No archive yet');
    const data = await resp.json();
    allDays = data.days || [];
    buildCategoryFilters();
    applyFilters();
    updateStats();
  } catch (e) {
    document.getElementById('archiveGrid').innerHTML =
      '<div class="empty-state"><div class="empty-state-emoji">📭</div><p>还没有历史数据，等第一次生成后这里就会填满惊喜 ✨</p></div>';
  }
}

function buildCategoryFilters() {
  const cats = new Set();
  allDays.forEach(d => {
    if (d.top_category) cats.add(d.top_category);
  });
  const container = document.getElementById('filters');
  container.innerHTML = '<button class="filter-chip active" data-category="all" onclick="setCategory(\'all\', this)">全部</button>';
  [...cats].sort().forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.dataset.category = c;
    btn.textContent = c;
    btn.onclick = () => setCategory(c, btn);
    container.appendChild(btn);
  });
}

function setCategory(cat, el) {
  activeCategory = cat;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allDays;

  if (activeCategory !== 'all') {
    filtered = filtered.filter(d => d.top_category === activeCategory);
  }

  if (query) {
    filtered = filtered.filter(d =>
      d.theme.toLowerCase().includes(query) ||
      d.top_product.toLowerCase().includes(query) ||
      d.top_category.toLowerCase().includes(query)
    );
  }

  renderGrid(filtered);
}

function renderGrid(days) {
  const grid = document.getElementById('archiveGrid');
  if (days.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-emoji">🔍</div><p>没有匹配的历史记录</p></div>';
    return;
  }

  grid.innerHTML = days.map(d => `
    <a href="daily/${d.date}.html" class="day-card"
      <style>.day-card::before { background: ${d.cover_color || '#e94560'}; }</style>
      <div class="day-card-date">${formatDate(d.date)}</div>
      <div class="day-card-theme">${d.theme}</div>
      <div class="day-card-meta">
        <span>🔥 ${d.outliers_count} 爆款</span>
        <span>📦 ${d.top_product}</span>
      </div>
    </a>
  `).join('');
}

function updateStats() {
  document.getElementById('statsBar').innerHTML =
    `共 <strong>${allDays.length}</strong> 天数据 · 最新：${allDays.length ? formatDate(allDays[0].date) : '—'}`;
}

function formatDate(d) {
  const parts = d.split('-');
  return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
}

loadArchive();
</script>
</body>
</html>
